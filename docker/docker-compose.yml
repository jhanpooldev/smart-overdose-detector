version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL + TimescaleDB
  # ─────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: sod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: Overdose-detector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/db/Overdose-detector.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Overdose-detector"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sod_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/Overdose-detector
      STORAGE_BACKEND: postgres
      ENV: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # No montar volumen en producción (imagen autosuficiente)
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2

volumes:
  pgdata:
